<div class="profile-page">
  <div class="profile-header">
    <h1>Meu Perfil</h1>

    <p>Gerencie suas informações pessoais</p>
  </div>

  <div class="profile-card">
    <div class="profile-avatar">
      <div class="avatar">{{ user?.nome?.charAt(0) }}{{ user?.nome?.split(' ')?.[1]?.charAt(0) || '' }}</div>

      <button class="change-photo-btn">Alterar Foto</button>

      <h2>{{ user?.nome }}</h2>
      <p>{{ user?.email }}</p>
    </div>

    <div class="profile-form">
      <div class="form-group">
        <label>Nome Completo</label>

        <input type="text" [value]="user?.nome" placeholder="Digite seu nome" />
      </div>

      <div class="form-group">
        <label>Email</label>

        <input type="email" [value]="user?.email" placeholder="Digite seu email" />
      </div>

      <div class="form-group">
        <label>Nova Senha</label>

        <input type="password" placeholder="Digite uma nova senha" />
      </div>

      <div class="form-group">
        <label>Confirmar Senha</label>

        <input type="password" placeholder="Confirme a senha" />
      </div>

      <div class="status-badge">
        <span>Status:</span>

        <strong>Ativo</strong>
      </div>

      <button type="button">Salvar Alterações</button>
    </div>
  </div>
</div>
