<div class="profile-page">
  <div class="profile-header">
    <h1>Meu Perfil</h1>

    <p>Gerencie suas informações pessoais</p>
  </div>

  <div class="profile-card">
    <div class="profile-avatar">
      <div class="avatar">
        {{ user?.nome?.charAt(0) }}{{ user?.nome?.split(' ')?.[1]?.charAt(0) || '' }}
      </div>

      <button class="change-photo-btn">Alterar Foto</button>

      <h2>{{ user?.nome }}</h2>
    </div>

    <div class="profile-form">
      <div class="form-group">
        <label>Nome Completo</label>

        <input type="text" [(ngModel)]="formData.nome" placeholder="Digite seu nome" />
      </div>

      <div class="form-group">
        <label>Email</label>

        <input type="email" [(ngModel)]="formData.email" placeholder="Digite seu email" />
      </div>

      <div class="form-group">
        <label>Nova Senha</label>

        <input
          #senha="ngModel"
          type="password"
          [(ngModel)]="formData.senha"
          name="senha"
          pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
          placeholder="Digite uma nova senha"
        />

        <small *ngIf="senha.invalid && senha.touched" class="error-message">
          A senha deve conter: letra maiúscula, minúscula, número e mínimo 8 caracteres.
        </small>
      </div>

      <div class="form-group">
        <label>Confirmar Senha</label>

        <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirme a senha" />
      </div>

      <button type="button" (click)="saveProfile()">Salvar Alterações</button>
    </div>
  </div>
</div>
