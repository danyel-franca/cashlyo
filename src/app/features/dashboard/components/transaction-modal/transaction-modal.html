<div class="modal-overlay">
  <div class="modal-container">

    <div class="modal-header">
      <div>
        <h2>
          {{ transactionData ? 'Editar Transação' : 'Nova Transação' }}
        </h2>

        <p>
          {{
            transactionData
              ? 'Atualize os dados da movimentação financeira'
              : 'Adicione uma nova movimentação financeira'
          }}
        </p>
      </div>

      <button type="button" class="close-button" (click)="closeModal()">✕</button>
    </div>


    <form class="modal-form" (ngSubmit)="saveTransaction()">
      <div class="form-group">
        <label for="tipo"> Tipo </label>

        <select id="tipo" [(ngModel)]="newTransaction.tipo" name="tipo">
          <option value="entrada">Entrada</option>

          <option value="saida">Saída</option>
        </select>
      </div>

      <div class="form-group">
        <label for="categoria"> Categoria </label>

        <select id="categoria" [(ngModel)]="newTransaction.categoria" name="categoria">
          <option value="">Selecione uma categoria</option>

          <option *ngFor="let category of filteredCategories" [value]="category">
            {{ category }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="valor"> Valor </label>

        <input
          id="valor"
          type="number"
          step="0.01"
          min="0"
          placeholder="0,00"
          [(ngModel)]="newTransaction.valor"
          name="valor"
        />
      </div>

      <div class="form-group">
        <label for="descricao"> Descrição </label>

        <input
          id="descricao"
          type="text"
          placeholder="Digite a descrição..."
          [(ngModel)]="newTransaction.descricao"
          name="descricao"
        />
      </div>

      <div class="form-group">
        <label for="data"> Data </label>

        <input id="data" type="date" [(ngModel)]="newTransaction.data" name="data" />
      </div>

      <button type="submit" class="save-button">
        {{ transactionData ? 'Atualizar Transação' : 'Salvar Transação' }}
      </button>
    </form>
  </div>
</div>
