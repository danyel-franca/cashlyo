<div class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <div>
        <h2>Criar Conta</h2>
        <p>Crie sua conta e comece a controlar suas finanças.</p>
      </div>

      <button type="button" class="close-button" (click)="close.emit()">✕</button>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="cadastrar()" class="register-form">
      <div class="form-group">
        <label>Nome Completo</label>

        <input type="text" placeholder="Digite seu nome completo" formControlName="nome" />
      </div>

      <div class="form-group">
        <label>Email</label>

        <input type="email" placeholder="Digite seu email" formControlName="email" />
      </div>

      <div class="form-group">
        <label>Senha</label>

        <input type="password" placeholder="Digite sua senha" formControlName="senha" />
      </div>

      <div class="form-group">
        <label>Confirmar Senha</label>

        <input type="password" placeholder="Confirme sua senha" formControlName="confirmarSenha" />
      </div>

      <button type="submit" class="submit-button">Criar Conta</button>
    </form>
  </div>
</div>
